<script>
  (function() {
    function addHomeLink() {
      if (document.getElementById('_nav-home')) return;
      var bar = document.querySelector('#_navbar .nav-btn-bar');
      if (!bar) return;
      var a = document.createElement('a');
      a.id = '_nav-home';
      a.href = '/';
      a.className = 'nav-btn nav-home-link';
      a.textContent = 'Home';
      var menu = bar.querySelector('#_menu');
      if (menu) menu.after(a);
    }
    addHomeLink();
    document.getElementById('_pushState').addEventListener('hy-push-state-after', addHomeLink);
  })();

<script>
  document.addEventListener('submit', function(e) {
    var form = e.target.closest('.contact-form');
    if (!form) return;
    e.preventDefault();
    fetch(form.action, {
      method: 'POST',
      body: new FormData(form),
      headers: { 'Accept': 'application/json' }
    }).then(function(res) {
      if (res.ok) {
        form.innerHTML = '<p class="contact-thanks">Thank you! I will be in touch shortly.</p>';
      } else {
        form.innerHTML = '<p class="contact-thanks">Something went wrong. Please email me directly.</p>';
      }
    }).catch(function() {
      form.innerHTML = '<p class="contact-thanks">Something went wrong. Please email me directly.</p>';
    });
  });
</script>

<nav id="js-toc" aria-label="Table of contents"></nav>
<script>
  (function() {
    var nav = document.getElementById('js-toc');

    function buildTOC() {
      nav.innerHTML = '';

      if (!window.matchMedia('(min-width: 104rem)').matches) return;
      if (!document.querySelector('article.page')) return;

      var items = [];

      var pageTitle = document.querySelector('article.page h1.page-title');
      if (pageTitle) items.push({ text: pageTitle.textContent.trim(), href: '#' });

      document.querySelectorAll('article.page h1:not(.page-title), article.page h2').forEach(function(h) {
        if (!h.id) return;
        var clone = h.cloneNode(true);
        clone.querySelectorAll('a, span').forEach(function(el) { el.remove(); });
        items.push({ text: clone.textContent.trim(), href: '#' + h.id });
      });

      if (!items.length) return;

      var label = document.createElement('p');
      label.textContent = 'TABLE OF CONTENTS';
      nav.appendChild(label);

      var ul = document.createElement('ol');
      items.forEach(function(item, i) {
        var li = document.createElement('li');
        var a = document.createElement('a');
        a.href = item.href;
        a.textContent = item.text;
        li.appendChild(a);
        ul.appendChild(li);
      });
      nav.appendChild(ul);
    }

    buildTOC();
    document.getElementById('_pushState').addEventListener('hy-push-state-after', buildTOC);
    window.addEventListener('resize', buildTOC, { passive: true });
  })();
</script>
<script>
  (function() {
    var popup = document.getElementById('ringo-popup');

    function attach() {
      document.querySelectorAll('.photo-tooltip').forEach(function(el) {
        el.addEventListener('mouseenter', function(e) {
          var r = el.getBoundingClientRect();
          popup.style.left = Math.min(r.left + r.width / 2 - 80, window.innerWidth - 168) + 'px';
          popup.style.top  = (r.top - 221) + 'px';
          popup.style.display = 'block';
        });
        el.addEventListener('mouseleave', function() { popup.style.display = 'none'; });
        el.addEventListener('click', function() {
          popup.style.display = popup.style.display === 'block' ? 'none' : 'block';
          if (popup.style.display === 'block') {
            var r = el.getBoundingClientRect();
            popup.style.left = Math.min(r.left + r.width / 2 - 80, window.innerWidth - 168) + 'px';
            popup.style.top  = (r.top - 221) + 'px';
          }
        });
      });
    }

    attach();
    document.getElementById('_pushState').addEventListener('hy-push-state-after', attach);
  })();
</script>

<script>
  (function() {
    var hiddenMain = null;
    var restoreTimer = 0;

    function isCoverRevealClick(event) {
      var trigger = event.target.closest && event.target.closest('.sidebar-title, .sidebar-about > a[href="/"]');
      var drawer = document.getElementById('_drawer');

      return trigger && drawer && drawer.classList.contains('cover') && (drawer.opened || drawer.hasAttribute('opened'));
    }

    function hideCurrentMain(event) {
      if (!isCoverRevealClick(event)) return;

      document.getElementById('_drawer').classList.add('is-condensing');

      hiddenMain = document.getElementById('_main');
      if (!hiddenMain) return;

      hiddenMain.style.opacity = '0';
      hiddenMain.style.visibility = 'hidden';

      window.clearTimeout(restoreTimer);
      restoreTimer = window.setTimeout(restoreCurrentMain, 8000);
    }

    function restoreCurrentMain() {
      var drawer = document.getElementById('_drawer');
      if (drawer) drawer.classList.remove('is-condensing');

      if (hiddenMain && document.getElementById('_main') === hiddenMain) {
        hiddenMain.style.opacity = '';
        hiddenMain.style.visibility = '';
      }
      hiddenMain = null;
      window.clearTimeout(restoreTimer);
    }

    document.addEventListener('pointerdown', hideCurrentMain, true);
    document.addEventListener('click', hideCurrentMain, true);

    var pushState = document.getElementById('_pushState');
    var drawer = document.getElementById('_drawer');

    if (drawer) {
      drawer.addEventListener('hy-drawer-transitioned', function() {
        drawer.classList.remove('is-condensing');
      });
    }

    if (pushState) {
      pushState.addEventListener('hy-push-state-networkerror', restoreCurrentMain);
    }
  })();
</script>
<script>
  (function() {
    var indicator = document.getElementById('scroll-indicator');
    var pushState = document.getElementById('_pushState');
    var storageKey = 'show-home-content';
    var pendingHomeContent = false;
    var dismissedForCurrentOpen = false;

    if (!indicator) return;

    function getStoredItem(key) {
      try {
        return window.sessionStorage && window.sessionStorage.getItem(key);
      } catch (error) {
        return null;
      }
    }

    function setStoredItem(key) {
      pendingHomeContent = true;
      try {
        if (window.sessionStorage) window.sessionStorage.setItem(key, 'true');
      } catch (error) {}
    }

    function removeStoredItem(key) {
      pendingHomeContent = false;
      try {
        if (window.sessionStorage) window.sessionStorage.removeItem(key);
      } catch (error) {}
    }

    function shouldShowHomeContent() {
      return pendingHomeContent || getStoredItem(storageKey);
    }

    function isGreenGradientActive() {
      var drawer = document.getElementById('_drawer');

      return drawer && drawer.classList.contains('cover') && (drawer.opened || drawer.hasAttribute('opened'));
    }

    function updateIndicator() {
      var isActive = isGreenGradientActive();

      if (!isActive) dismissedForCurrentOpen = false;

      indicator.classList.toggle('is-visible', isActive && !dismissedForCurrentOpen && !shouldShowHomeContent());
    }

    function updateIndicatorSoon() {
      window.requestAnimationFrame(updateIndicator);
    }

    function showHomeContent() {
      dismissedForCurrentOpen = true;
      removeStoredItem(storageKey);
      indicator.classList.remove('is-visible');

      var sidebarTitle = document.querySelector('.sidebar-title');
      if (sidebarTitle) sidebarTitle.click();
    }

    if (shouldShowHomeContent()) {
      showHomeContent();
    }

    indicator.addEventListener('click', function(event) {
      var target = new URL(indicator.href, window.location.href);
      var current = new URL(window.location.href);
      var isHome = target.origin === current.origin && target.pathname === current.pathname;

      setStoredItem(storageKey);

      if (isHome) {
        event.preventDefault();
        showHomeContent();
      }
    });

    if (pushState) {
      pushState.addEventListener('hy-push-state-after', function() {
        if (shouldShowHomeContent()) {
          showHomeContent();
        } else {
          updateIndicatorSoon();
        }
      });
    }

    document.addEventListener('init', updateIndicatorSoon, true);
    document.addEventListener('transitioned', updateIndicatorSoon, true);

    if (window.MutationObserver) {
      new MutationObserver(updateIndicatorSoon).observe(document.documentElement, {
        subtree: true,
        attributes: true,
        attributeFilter: ['class', 'opened']
      });
    }

    updateIndicatorSoon();
  })();
</script>

{% if site.matomo_analytics %}
<script>
  var _paq = _paq || [];

  /*{% if site.matomo_analytics.no_cookies %}*/
  _paq.push(['disableCookies']);
  /*{% endif %}*/

  _paq.push(['trackPageView']);
  _paq.push(['enableLinkTracking']);
  _paq.push(['setTrackerUrl', u+'piwik.php']);
  _paq.push(['setSiteId', '{{site.matomo_analytics.site_id}}']);

  var pushStateEl = document.getElementById('_pushState');
  var timeStartLoadPage, referer, timeItTookToLoadPage;

  pushStateEl.addEventListener('hy-push-state-start', function() {
    timeStartLoadPage = new Date().getTime();
    referer = window.location.toString();
  });

  pushStateEl.addEventListener('hy-push-state-ready', function() {
    timeItTookToLoadPage = new Date().getTime() - timeStartLoadPage;
  });

  pushStateEl.addEventListener('hy-push-state-after', function() {
    _paq.push(['setReferrerUrl', referer]);
    _paq.push(['setCustomUrl', window.location.toString()]);
    _paq.push(['setDocumentTitle', document.title]);
    _paq.push(['deleteCustomVariables', 'page']);
    _paq.push(['setGenerationTimeMs', timeItTookToLoadPage]);
    _paq.push(['trackPageView']);
  });

  window.loadJSDeferred('{{site.matomo_analytics.root}}piwik.js');
</script>
{% endif %}
