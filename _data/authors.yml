# The primary author of this blog.
# Must be the same as `author` in `_config.yml`.
# Change `author1` to your shortname.
author1:
  name:              Gavin M. Klorfine
  email:             gklorfin@yorku.ca

  # Used at the bottom of each page and at the top of the `about` layout
  # Markdown enabled, can use multiple paragraphs (enabled by `|`)
  about:             |
    I'm a graduate student in the Quantitative Methods program at York University, Toronto, Canada. 
    My research thus far has focused on R package development, the (mis)use of statistical methods, and reproducibility. 
    I am also interested in statistical programming more broadly, with a focus on R and Python. When I'm not in the lab,
    I am usually playing guitar or spending time with my dog, <span class="photo-tooltip">Ringo</span>.

    # Highlights of my work

      - 📦 Second author of Professor Michael Friendly's R package [**vcdExtra**](https://github.com/friendly/vcdExtra).

        - Built the beginnings of a 'tidy' framework for working with categorical data in R. A vignette describing this work may be found [here](https://friendly.github.io/vcdExtra/articles/a1a-convert-collapse.html).

      - 🏆 [**First prize**](https://ssc.ca/en/meetings/thirteenth-annual-canadian-statistics-student-conference) (Bachelor's) oral presentation at the Canadian Statistics Student Conference run by the Statistical Society of Canada.

        - My presentation was on the work I did for my undergraduate thesis, which was an investigation into the validity of methods to detect questionable research practices (e.g., *p*-hacking) in large sets of results.
    
      - 🐍 Co-creating an introductory workshop for data analysis in Python ([**enrol here**](https://qm.info.yorku.ca/qmws/)).
        
        - To be delivered through the *Quantitative Methods Workshop Series* run by the *Department of Psychology* and *Statistical Consulting Service* at York University.

